name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  DEPLOY_PATH: /var/www/hostera24-influencers

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Verify deploy secrets
        run: |
          missing=""
          [ -z "${{ secrets.VPS_HOST }}" ] && missing="${missing} VPS_HOST"
          [ -z "${{ secrets.VPS_USER }}" ] && missing="${missing} VPS_USER"
          [ -z "${{ secrets.VPS_SSH_KEY }}" ] && missing="${missing} VPS_SSH_KEY"
          if [ -n "$missing" ]; then
            echo "::error::Missing GitHub Actions secrets:${missing}. Add them under Settings → Secrets and variables → Actions."
            exit 1
          fi

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.2.2
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          command_timeout: 25m
          script: |
            set -euo pipefail
            cd "${{ env.DEPLOY_PATH }}"
            git fetch origin main
            git reset --hard origin/main
            docker compose build
            docker compose up -d
            docker image prune -f
            docker compose ps

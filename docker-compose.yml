services:
  mysql:
    image: mysql:8.0
    container_name: hostera24-mysql
    restart: unless-stopped
    ports:
      - "127.0.0.1:${MYSQL_PORT}:3306"
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend-hostera24/docker/mysql/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "root",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - hostera24

  api:
    build:
      context: ./backend-hostera24
      dockerfile: Dockerfile
    container_name: hostera24-api
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      UPLOADS_DIR: /app/uploads
      PUBLIC_UPLOADS_BASE_URL: ${PUBLIC_UPLOADS_BASE_URL}
      FIREBASE_PROJECT_ID: ${FIREBASE_PROJECT_ID}
      FIREBASE_SERVICE_ACCOUNT_PATH: /app/firebase-service-account.json
    volumes:
      - ./uploads:/app/uploads
      - ./firebase-service-account.json:/app/firebase-service-account.json:ro
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "127.0.0.1:${PORT}:${PORT}"
    networks:
      - hostera24

  web:
    build:
      context: .
      dockerfile: frontend-hostera24/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
        NEXT_PUBLIC_SITE_URL: ${NEXT_PUBLIC_SITE_URL}
        WEB_BASE_URL: ${WEB_BASE_URL}
    container_name: hostera24-web
    restart: unless-stopped
    env_file: .env
    environment:
      PORT: ${FRONTEND_PORT}
    depends_on:
      - api
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:${FRONTEND_PORT}"
    networks:
      - hostera24

networks:
  hostera24:

volumes:
  mysql_data:
